<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opening PetMatch App...</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }
      .container {
        text-align: center;
        padding: 40px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        max-width: 500px;
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 4px solid white;
        width: 60px;
        height: 60px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      h1 {
        font-size: 24px;
        margin: 20px 0;
      }
      p {
        font-size: 16px;
        opacity: 0.9;
      }
      .fallback {
        margin-top: 30px;
        font-size: 14px;
        opacity: 0.8;
      }
    </style>
    <script>
      // Extract URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get("email") || "";
      const token = urlParams.get("token") || "";
      const type = urlParams.get("type") || "";

      // Build the custom scheme URL with all parameters
      let appUrl = "petmatch://reset-password";
      const params = [];
      if (email) params.push(`email=${encodeURIComponent(email)}`);
      if (token) params.push(`token=${encodeURIComponent(token)}`);
      if (type) params.push(`type=${encodeURIComponent(type)}`);
      if (params.length > 0) {
        appUrl += "?" + params.join("&");
      }

      // Try to open the mobile app
      window.location.href = appUrl;

      // Fallback message after 2 seconds if app didn't open
      setTimeout(function () {
        document.getElementById("message").innerHTML =
          "If the PetMatch app did not open automatically, please:<br>" +
          "1. Open the PetMatch app manually<br>" +
          "2. Navigate to the password reset screen<br>" +
          "3. Enter your new password";
        document.getElementById("spinner").style.display = "none";
      }, 2000);
    </script>
  </head>
  <body>
    <div class="container">
      <div id="spinner" class="spinner"></div>
      <h1 id="message">Opening PetMatch App...</h1>
      <p>Please wait while we redirect you to the app.</p>
      <div class="fallback">
        Make sure you have the PetMatch app installed on your device.
      </div>
    </div>
  </body>
</html>
