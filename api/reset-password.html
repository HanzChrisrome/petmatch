<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - PetMatch</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      .icon {
        font-size: 64px;
        margin-bottom: 20px;
      }

      h1 {
        color: #333;
        margin-bottom: 16px;
        font-size: 28px;
      }

      p {
        color: #666;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .btn {
        display: inline-block;
        background: #667eea;
        color: white;
        padding: 14px 32px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        margin-top: 16px;
        transition: background 0.3s;
      }

      .btn:hover {
        background: #5568d3;
      }

      .status {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        background: #f0f0f0;
        color: #666;
        font-size: 14px;
      }

      .loader {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🔐</div>
      <h1 id="title">Opening PetMatch...</h1>
      <p id="message">Please wait while we redirect you to the app.</p>
      <div class="loader" id="loader"></div>
      <div class="status" id="status">Attempting to open the app...</div>
      <a href="#" class="btn" id="manualBtn" style="display: none"
        >Open App Manually</a
      >
    </div>

    <script>
      // Get URL parameters from Supabase redirect
      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get("email");
      const token =
        urlParams.get("token") ||
        urlParams.get("access_token") ||
        urlParams.get("code");
      const type = urlParams.get("type");

      // Build deep link URL with all parameters
      let deepLink = "petmatch://reset-password";
      const params = [];
      if (email) params.push(`email=${encodeURIComponent(email)}`);
      if (token) params.push(`token=${encodeURIComponent(token)}`);
      if (type) params.push(`type=${encodeURIComponent(type)}`);

      if (params.length > 0) {
        deepLink += "?" + params.join("&");
      }

      const statusEl = document.getElementById("status");
      const loaderEl = document.getElementById("loader");
      const manualBtn = document.getElementById("manualBtn");
      const titleEl = document.getElementById("title");
      const messageEl = document.getElementById("message");

      // Set manual button link
      manualBtn.href = deepLink;

      console.log("Deep link URL:", deepLink);
      console.log("URL params:", { email, token, type });

      // Try to open the app immediately
      setTimeout(() => {
        statusEl.textContent = "Redirecting to PetMatch app...";
        window.location.href = deepLink;
      }, 500);

      // Show manual option after 3 seconds
      setTimeout(() => {
        loaderEl.style.display = "none";
        titleEl.textContent = "App Not Opening?";
        messageEl.textContent =
          "If the PetMatch app didn't open automatically, you can open it manually by clicking the button below.";
        statusEl.style.display = "none";
        manualBtn.style.display = "inline-block";
      }, 3000);

      // Detect if user returns to page (app didn't open)
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          setTimeout(() => {
            loaderEl.style.display = "none";
            titleEl.textContent = "App Not Installed?";
            messageEl.textContent =
              "It looks like you don't have the PetMatch app installed. Please download it from your app store.";
            manualBtn.textContent = "Try Again";
            manualBtn.style.display = "inline-block";
          }, 2000);
        }
      });
    </script>
  </body>
</html>
